<!DOCTYPE html>
<html>
<head>
<style>
.container {
  position: relative;
  width: 300px;
  height: 300px;
  background-color: lightgray;
}
.box {
  position: absolute;
  width: 80px;
  height: 80px;
}
.top-left {
  top: 0; 
  left: 0;
  background-color: coral;
}
.top-right {
  top: 0; 
  right: 0;
  background-color: lightblue;
}
.bottom-left {
  bottom: 0; 
  left: 0;
  background-color: lightgreen;
}
.bottom-right {
  bottom: 0; 
  right: 0;
  background-color: yellow;
}
</style>
</head>
<body>
<div class="container">
  <div class="box top-left">TL</div>
  <div class="box top-right">TR</div>
  <div class="box bottom-left">BL</div>
  <div class="box bottom-right">BR</div>
</div>
</body>
</html>
