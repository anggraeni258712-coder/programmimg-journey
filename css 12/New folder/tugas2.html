<!DOCTYPE html>
<html>
<head>
<style>
.top-left {
  position: fixed;
  top: 0;
  left: 0;
  background-color: orange;
  padding: 10px;
}
.back-to-top {
  position: fixed;
  bottom: 10px;
  right: 10px;
  background-color: lightblue;
  padding: 10px;
  cursor: pointer;
}
.left-side {
  position: fixed;
  top: 50%;
  left: 0;
  background-color: lightgreen;
  padding: 10px;
}
.right-side {
  position: fixed;
  top: 50%;
  right: 0;
  background-color: pink;
  padding: 10px;
}
</style>
</head>
<body>
    <div class="top-left">Fixed Top Left</div>
    <div class="back-to-top" onclick="window.scrollTo(0,0)">Back to Top</div>
    <div class="left-side">Left Fixed</div>
    <div class="right-side">Right Fixed</div>

    <p style="height:2000px;">Scroll down to see fixed elements.</p>
</body>
</html>
