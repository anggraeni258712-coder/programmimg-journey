<!DOCTYPE html>
<html>
<head>
    <title>Tugas Border</title>
    <style>

        .solid {
            border: 4px solid blue;
            background-color: #e6f0ff;
            padding: 10px;
        }
        .dotted {
            border: 4px dotted green;
            background-color: #e6ffe6;
            padding: 10px;
        }
        .double {
            border: 4px double red;
            background-color: #ffe6e6;
            padding: 10px;
        }
        .dashed {
            border: 4px dashed plum;
            background-color: #f2f2f2;
            padding: 10px;
        }
        .groove {
            border: 4px groove indigo;
            background-color: #ffe6e6;
            padding: 10px;
        }
        .ridge {
            border: 4px ridge palevioletred;
            background-color: #e6ffe6;
            padding: 10px;
        }
    </style>
</head>
<body>
    <p class="solid">Ini adalah border solid</p>
    <p class="dotted">Ini adalah border dotted</p>
    <p class="double">Ini adalah double double</p>
    <p class="dashed">Ini adalah border dashed</p>
    <p class="groove">Ini adalah border groove</p>
    <p class="ridge">Ini adalah border ridge</p>
</body>
</html>
