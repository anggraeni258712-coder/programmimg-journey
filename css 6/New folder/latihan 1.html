<!DOCTYPE html>
<html>
<head>
    <title>Latihan 1 Border</title>
    <style>
        .kotak {
            width: 100px;
            height: 50px;
            margin: 10px;
            padding: 5px;
        }
        .solid {
            border: 1px solid black;
        }
        .double {
            border: 1px double blue;
        }
        .groove {
            border: 1px groove green;
        }
        .ridge {
            border: 1px ridge red;
        }
    </style>
</head>
<body>
    <div class="kotak solid">Border Solid</div>
    <div class="kotak double">Border Double</div>
    <div class="kotak groove">Border Groove</div>
    <div class="kotak ridge">Border Ridge</div>
</body>
</html>
