<!DOCTYPE html>
<html>
<head>
    <title>Latihan 1 - Width dan Height</title>
    <style>
        .box1 {
            width: 200px;
            height: 200px;
            background-color: pink;
            border: 2px solid black
        }

        .box2 {
            width: 50%;
            height: 150px;
            background-color: palevioletred;
            border: 2px solid black;
        }

        .box3 {
            width: 80vw;
            height: 30vh;
            background-color: pink;
            border: 2px solid black;
        }
    </style>
</head>
<body>

    <div class="box1">Box 1</div>
    <div class="box2">Box 2</div>
    <div class="box3">Box 3</div>

</body>
</html>
