<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overflow visible</title>
    <style>
        div {
            background-color: coral;
            width: 200px;
            height: 65px;
            border: 1px solid;
            overflow: visible;
        }

    </style>
</head>
<body>
    <h2>Overflow: visible</h2>

    <div>By default, the overflow is visible,
        meaning thet it is not clipped and it
        readers outside the element's box.
    </div>

    <p>You can use the overflow property
        when you want to have better control of the layout.
        The overflow property specifies what happens
        if content overflow an elemen't box.
    </p>
</body>
</html>
